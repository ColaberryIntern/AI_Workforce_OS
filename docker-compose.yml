# Local-development docker-compose. Spec: /directives/microservices.md.
#
# Brings up Postgres + the API + the worker + the frontend. Production
# deployment (K8s, secret manager, APM vendor wiring) is deferred to the
# Wave-2 owner-decisions list.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: aiwos
      POSTGRES_PASSWORD: aiwos
      POSTGRES_DB: aiwos
    ports:
      - '5432:5432'
    volumes:
      - aiwos_db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U aiwos -d aiwos']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: '4000'
      DATABASE_URL: postgres://aiwos:aiwos@db:5432/aiwos
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod-use-32-byte-random-secret}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      CORS_ORIGIN: http://localhost:8080
    ports:
      - '4000:4000'

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://aiwos:aiwos@db:5432/aiwos
      LOG_LEVEL: info
      TICK_INTERVAL_MS: '5000'
      ALERT_TICK_INTERVAL_MS: '60000'

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '8080:80'

volumes:
  aiwos_db:
